name: RAGAS Evaluation

on:
  schedule:
    - cron: "0 18 * * *"  # 03:00 JST 毎日
  pull_request:
    paths:
      - "backend/src/search.py"
      - "backend/src/rag.py"
      - "backend/src/chunker.py"
      - "backend/src/bm25*.py"
      - "evaluation/**"
      - "config.yml"
  workflow_dispatch:

permissions:
  contents: write   # spec_043 hotfix: nightly baseline-update step needs to push back to main

jobs:
  ragas:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the GITHUB_TOKEN explicitly so the later git push uses the permission above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[eval]"

      - name: Build index
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # spec_031 made knowledge_dir a required positional arg; pass it explicitly.
        run: python scripts/build_index.py examples/knowledge --rebuild

      - name: Run RAGAS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p evaluation/runs
          python -m evaluation.run_ragas \
            --dataset evaluation/datasets/qa_v1.json \
            --baseline evaluation/baseline.json \
            --output evaluation/runs/ci-${{ github.sha }}.json
        continue-on-error: true  # v0.7: WARN only

      - name: Generate PR comment
        if: github.event_name == 'pull_request'
        run: |
          python -c "
          from pathlib import Path
          from evaluation.report import generate_ragas_report
          comment = generate_ragas_report(
              Path('evaluation/runs/ci-${{ github.sha }}.json'),
              Path('evaluation/baseline.json'),
          )
          Path('/tmp/comment.md').write_text(comment)
          "

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentFile = '/tmp/comment.md';
            if (!fs.existsSync(commentFile)) {
              console.log('Comment file not found, skipping.');
              return;
            }
            const body = fs.readFileSync(commentFile, 'utf-8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-run-${{ github.sha }}
          path: evaluation/runs/

      - name: Update baseline (nightly only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m evaluation.run_ragas \
            --dataset evaluation/datasets/qa_v1.json \
            --baseline evaluation/baseline.json \
            --output evaluation/runs/nightly-${{ github.sha }}.json \
            --update-baseline
          if [[ -n "$(git status --porcelain evaluation/baseline.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add evaluation/baseline.json
            git commit -m "chore(ragas): nightly baseline update [skip ci]"
            git push
          fi
