name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: backend,   dockerfile: Dockerfile.backend }
          - { name: frontend,  dockerfile: Dockerfile.frontend }
          - { name: streamlit, dockerfile: Dockerfile.streamlit }
    name: build (${{ matrix.target.name }})
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.target.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.target.dockerfile }}
          push: false
          tags: axis-knowledge-rag-${{ matrix.target.name }}:ci
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target.name }}
