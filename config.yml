axes:
  - name: category
    type: enum
    # spec_056: spec/result/adr/changelog are added so dev-history memos under
    # ~/axis-knowledge/ (project spec lifecycle: spec → result → adr → changelog)
    # show up in the Web UI axis filter alongside the original 7 personal-note
    # categories. loader does not strictly validate enum values, so existing
    # memos with other categories keep working; this list drives /api/axes only.
    values: ["就活", "業務", "学習", "議事録", "ToDo", "メモ", "技術記事", "spec", "result", "adr", "changelog"]
    required: true

  - name: topic
    type: string
    required: true

  - name: status
    type: enum
    values: ["進行中", "完了", "保留", "アーカイブ"]
    required: false

  - name: level
    type: enum
    values: ["初級", "中級", "上級"]
    required: false

  - name: client
    type: string
    required: false

  - name: year
    type: integer
    required: false

normalization:
  nfkc: true
  katakana_to_hiragana: true
  lowercase: true

integrity:
  check_refs: true
  fail_on_broken: false

# spec_031: Parent Document Retrieval (Small-to-Big).
# When enabled, the index stores child sub-chunks (~256 tokens) and search
# returns their parent H2 sections — better precision while still feeding
# the LLM coherent context blocks. Set `enabled: false` to fall back to
# the legacy file-level path.
retrieval:
  parent_doc:
    enabled: true
    chunk_strategy: h2          # currently only "h2" is implemented
    max_child_tokens: 256
    top_k_children: 20
    top_n_parents: 5
    storage: "sqlite"           # spec_037: "sqlite" (default) | "json" (legacy v0.7)

  # spec_035: Time-Weighted Decay (recency boost, opt-in).
  # Multiplies final score by exp(-ln(2) * age_days / half_life_days) * weight.
  # Set enabled: true to activate; default off so existing behaviour is unchanged.
  # date_field: frontmatter key to read — "updated" matches examples/knowledge/*.md
  time_decay:
    enabled: false              # default off (opt-in)
    half_life_days: 180         # half-year → score * 0.5 at 180 days old
    weight: 0.15                # up to 15% of score influenced by recency
    date_field: "updated"       # "created" also works

rag:
  context_max_chars: 8000

# spec_032: Conversational RAG (chat with history).
# spec_036 added pluggable storage backends (memory / sqlite / redis).
# Default is sqlite → sessions survive restarts and uvicorn worker rotation.
chat:
  enabled: true
  max_history_turns: 6        # 6 turn = 12 messages kept in store
  ttl_seconds: 86400          # 24h since last access → evicted
  max_sessions: 100           # LRU cap; oldest last_access dropped first
  rewriter:
    enabled: true             # false → skip rewrite, use original query
    model: "gemini-1.5-flash"
  # spec_036: storage backend selection.
  # - backend: "sqlite" (default) — file-backed, survives restarts
  # - backend: "memory"          — v0.7 in-memory; lost on restart
  # - backend: "redis"           — requires `pip install -e ".[redis]"`
  storage:
    backend: "sqlite"
    sqlite_path: "~/.axis_chat.db"           # only used when backend=sqlite
    redis_url: "redis://localhost:6379/0"    # only used when backend=redis

# spec_040: GraphRAG + 3D Knowledge Graph (v0.8 marquee feature).
# Builds a directed graph from frontmatter `refs:` at startup. Used for:
#   - /api/graph endpoints (3D visualization on the frontend)
#   - /api/search graph_expand=true (1-hop neighbour merge after BM25 fusion)
#   - axis_neighbors MCP tool
# `expand_on_search: false` keeps existing /api/search behaviour identical;
# clients must explicitly opt in (graph_expand=true on the request) for the
# expansion path to fire.
graph:
  enabled: true
  default_hop: 1
  max_neighbors_per_query: 20
  expand_on_search: false
  # spec_054: `./examples/knowledge` is the OSS demo corpus; for personal use,
  # keep your notes outside the repo (e.g. `~/axis-knowledge/`) and override
  # at runtime via the `AXIS_KNOWLEDGE_DIR` env var — this leaves the demo
  # corpus + test fixtures untouched. See docs/configuration.md.
  knowledge_dir: "./examples/knowledge"

# spec_045: Ollama / Llama.cpp full on-prem backend selection.
# spec_052 (v0.9.1): generation.backend now defaults to "auto" → Claude
# when ANTHROPIC_API_KEY is set, Gemini when only GEMINI_API_KEY is set,
# DUMMY otherwise. Users without an Anthropic key still get real RAG
# answers from the Gemini key they already had for the embedder.
# Flip the `backend` keys to "ollama" to run fully on-prem; the embedder
# switch is index-incompatible (bge-m3 = 1024 dim vs Gemini = 768 dim) so
# run `python -m scripts.build_index ... --rebuild` after.
#
#   embedder.backend:    "gemini" (default) | "ollama" | "dummy"
#   generation.backend:  "auto" (default) | "claude" | "gemini" | "ollama" | "dummy"
#
# Ollama itself: `docker compose --profile ollama up -d ollama` and then
# `docker exec axis-ollama ollama pull <model>` (see docs/deployment.md).
embedder:
  backend: "gemini"
  ollama:
    model: "bge-m3"                  # 1024-dim multilingual (JP/EN)
    url: "http://localhost:11434"

generation:
  backend: "auto"                    # auto | claude | gemini | ollama | dummy
  gemini:
    model: "gemini-2.5-flash"        # used by backend="gemini" or auto-fallback
  ollama:
    model: "llama3"                  # try "llama3:70b" / "qwen2.5" / etc.
    url: "http://localhost:11434"

# spec_047: Active-learning feedback loop (👍 / 👎 button → SQLite).
# Records (query, doc_id, rating, session_id, note, timestamp) so we can
# build weekly reports of unpopular docs / under-served queries. Auto
# weight-tuning is parked for v0.10; this section is the ground-truth
# capture layer. Flip `enabled: false` to make /api/feedback return 503.
feedback:
  enabled: true
  db_path: "~/.axis_feedback.db"

# spec_048: Knowledge-gap detection (search misses + "LLM doesn't know" signals).
# Records (query, reason, top_score, n_results, timestamp) into a local SQLite
# whenever search returns no hits, the top hit falls below `low_score_threshold`,
# or the LLM answers "提供された資料には記載がありません" (regex detection).
# Surfaced as a weekly markdown report via `make gap-report` and
# GET /api/gap/report?days=7 — answers "what topics should we ingest next?"
# Flip `enabled: false` to make every hook a no-op (zero hot-path overhead).
gap:
  enabled: true
  db_path: "~/.axis_gap.db"
  low_score_threshold: 0.35
