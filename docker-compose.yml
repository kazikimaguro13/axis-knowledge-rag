services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma-data:/app/.chromadb
      - ./examples/knowledge:/app/examples/knowledge:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

  # spec_036: optional Redis backend for ConversationStore. Off by default;
  # activate with `docker compose --profile redis-backend up redis`, then set
  # config.yml > chat.storage.backend: "redis" and install [redis] extras.
  redis:
    image: redis:7-alpine
    profiles: ["redis-backend"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >-
      redis-server
      --appendonly yes
      --maxmemory-policy allkeys-lru

volumes:
  chroma-data:
  redis-data:
