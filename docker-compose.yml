services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma-data:/app/.chromadb
      - ./examples/knowledge:/app/examples/knowledge:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

  # spec_036: optional Redis backend for ConversationStore. Off by default;
  # activate with `docker compose --profile redis-backend up redis`, then set
  # config.yml > chat.storage.backend: "redis" and install [redis] extras.
  redis:
    image: redis:7-alpine
    profiles: ["redis-backend"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >-
      redis-server
      --appendonly yes
      --maxmemory-policy allkeys-lru

  # spec_045: optional Ollama backend for fully on-prem embedding +
  # generation. Off by default; activate with
  # `docker compose --profile ollama up -d ollama`, pull models with
  # `docker exec axis-ollama ollama pull bge-m3 && ... pull llama3`,
  # then flip config.yml > {embedder,generation}.backend to "ollama".
  ollama:
    image: ollama/ollama:latest
    container_name: axis-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  chroma-data:
  redis-data:
  ollama-data:
